<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(122,122,255,0.22)"/>
      <stop offset="60%" stop-color="rgba(122,122,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(122,122,255,0)"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a7aff"/>
      <stop offset="100%" stop-color="#5c9fff"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="#0e0e14"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="-50" rx="650" ry="280" fill="url(#glow)"/>

  <!-- Top bar -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <!-- Logo -->
    <text x="72" y="86" font-size="22" font-weight="600">
      <tspan fill="#7a7aff">mp</tspan><tspan fill="rgba(255,255,255,0.4)">.dev</tspan>
    </text>

    <!-- Available badge -->
    <g transform="translate(972, 64)">
      <rect width="156" height="38" rx="19"
            fill="rgba(13,13,20,0.7)"
            stroke="rgba(16,185,129,0.35)"
            stroke-width="1"/>
      <circle cx="22" cy="19" r="4.5" fill="#10b981"/>
      <text x="38" y="24" font-size="13" font-weight="500" fill="#10b981" letter-spacing="1">
        AVAILABLE
      </text>
    </g>
  </g>

  <!-- Main heading -->
  <g font-family="Inter, system-ui, -apple-system, sans-serif">
    <text x="72" y="320"
          font-size="124" font-weight="600"
          fill="#f0f0fa" letter-spacing="-4">
      Mohit Pal
    </text>
    <text x="72" y="378"
          font-size="34" font-weight="300"
          fill="rgba(255,255,255,0.55)">
      Full-Stack Engineer
    </text>
    <text x="72" y="424"
          font-size="20" font-weight="400"
          fill="rgba(255,255,255,0.4)">
      Production-grade Spring Boot microservices · Modern React interfaces
    </text>
  </g>

  <!-- Tech tags -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15"
     transform="translate(72, 478)">
    <g>
      <rect width="68" height="32" rx="6" fill="rgba(122,122,255,0.08)" stroke="rgba(122,122,255,0.25)"/>
      <text x="34" y="21" text-anchor="middle" fill="#9ea0ff">Java</text>
    </g>
    <g transform="translate(80, 0)">
      <rect width="120" height="32" rx="6" fill="rgba(122,122,255,0.08)" stroke="rgba(122,122,255,0.25)"/>
      <text x="60" y="21" text-anchor="middle" fill="#9ea0ff">Spring Boot</text>
    </g>
    <g transform="translate(212, 0)">
      <rect width="148" height="32" rx="6" fill="rgba(122,122,255,0.08)" stroke="rgba(122,122,255,0.25)"/>
      <text x="74" y="21" text-anchor="middle" fill="#9ea0ff">Microservices</text>
    </g>
    <g transform="translate(372, 0)">
      <rect width="100" height="32" rx="6" fill="rgba(122,122,255,0.08)" stroke="rgba(122,122,255,0.25)"/>
      <text x="50" y="21" text-anchor="middle" fill="#9ea0ff">React.js</text>
    </g>
    <g transform="translate(484, 0)">
      <rect width="68" height="32" rx="6" fill="rgba(122,122,255,0.08)" stroke="rgba(122,122,255,0.25)"/>
      <text x="34" y="21" text-anchor="middle" fill="#9ea0ff">AWS</text>
    </g>
    <g transform="translate(564, 0)">
      <rect width="148" height="32" rx="6" fill="rgba(122,122,255,0.08)" stroke="rgba(122,122,255,0.25)"/>
      <text x="74" y="21" text-anchor="middle" fill="#9ea0ff">Cloud-Native</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="72" y1="552" x2="1128" y2="552" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Footer row -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15"
     fill="rgba(255,255,255,0.4)" transform="translate(72, 588)">
    <text>github.com/im-d3v</text>
    <text x="220">linkedin.com/in/im-d3v</text>
    <text x="465">mohitpal2204@gmail.com</text>
  </g>
  <text x="1128" y="600" text-anchor="end"
        font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13"
        fill="rgba(122,122,255,0.7)">
    ›_ press ` to open terminal
  </text>
</svg>
