<!DOCTYPE html>

  <head>

    <!-- Theme -->

    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="mp.dev" />
    <meta property="og:title" content="Mohit Pal — Full-Stack Engineer" />
    <meta property="og:description" content="Building production-grade Spring Boot microservices and modern React interfaces. Java · Spring Cloud · AWS · Real-time systems." />
    <meta property="og:image" content="https://im-d3v.github.io/Portfolio/og-image.svg" />

    <meta name="twitter:creator" content="@im-d3v" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Anti-flash theme script -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Structured data -->
    <script type="application/ld+json">

        "@type": "Person",

        "email": "mailto:mohitpal2204@gmail.com",
        "sameAs": [
          "https://github.com/im-d3v",
          "https://linkedin.com/in/im-d3v"

        "knowsAbout": [
          "Java", "Spring Boot", "Spring Cloud", "Microservices",
