server.port=8080

# CORS — update for production domain
portfolio.cors.allowed-origins=http://localhost:3000,http://localhost:5173,${CORS_ALLOWED_ORIGIN:}

# Mail — fill in real credentials before deploying
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

portfolio.contact.to-email=${CONTACT_TO_EMAIL:mohitpal2204@gmail.com}
